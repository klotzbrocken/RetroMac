<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:transparent;-webkit-user-select:none;}
  body{pointer-events:none;}
  #pet{position:absolute;left:0;top:0;image-rendering:pixelated;background-repeat:no-repeat;
    will-change:left,top,transform;pointer-events:auto;cursor:grab;}
  #pet.grabbing{cursor:grabbing;}
</style>
</head>
<body>
  <div id="pet"></div>
<script>
/* Original lightweight desktop-pet engine (no third-party code).
   Host (DesktopPetController) calls startPet(specJSON) and setGround(px). The pet falls
   to the floor (top of the taskbar), wanders, idles/runs, and is grabbable: drag to pick
   it up and drop it (it falls again); a tap makes it scamper. */
(function(){
  const el = document.getElementById('pet');
  let spec=null, fw=48, fh=48, scale=1, sheetCols=1, walkSpeed=40, groundOffsetPx=0;
  let x=0, y=0, vy=0, dir=1;
  let state='fall', anim=null, frameIdx=0, frameTimer=0, stateTimer=0, vx=0;
  let last=0, held=false, grabDX=0, grabDY=0, moved=false, lastReport=0;

  function pw(){ return fw*scale; }
  function ph(){ return fh*scale; }
  function floorY(){ return window.innerHeight - groundOffsetPx - ph(); }

  function setAnim(n){ if(spec&&spec.animations[n]){ anim=spec.animations[n]; frameIdx=0; frameTimer=0; } }
  function paint(){
    const fr = anim ? anim.frames[frameIdx % anim.frames.length] : 0;
    const col = fr % sheetCols, row = (fr/sheetCols)|0;
    el.style.backgroundPosition = `-${col*pw()}px -${row*ph()}px`;
    el.style.transform = `scaleX(${-dir})`;   // sheet faces left → flip when walking right
    el.style.left = Math.round(x)+'px';
    el.style.top  = Math.round(y)+'px';
    report();
  }
  function report(){
    const t = performance.now(); if (t - lastReport < 100) return; lastReport = t;
    if (window.webkit && webkit.messageHandlers && webkit.messageHandlers.pet)
      webkit.messageHandlers.pet.postMessage({x:Math.round(x), y:Math.round(y), w:Math.round(pw()), h:Math.round(ph())});
  }
  function pick(){
    const r=Math.random();
    const extras=['eat','sleep','pee','rotate'].filter(k=>spec.animations[k]);
    if(r<0.14){ state='idle'; setAnim('idle'); vx=0; stateTimer=1200+Math.random()*2200; }
    else if(r<0.36 && extras.length){
      const k=extras[(Math.random()*extras.length)|0];
      state=k; setAnim(k); vx=0;
      const a=spec.animations[k];
      stateTimer=a.frames.length*a.frameMs*(Math.random()<0.4?2:1)+200;   // play 1–2 loops
    }
    else if(r<0.48){ state='run'; setAnim('run'); dir=Math.random()<0.5?-1:1; vx=dir*walkSpeed*2.2; stateTimer=700+Math.random()*1300; }
    else { state='walk'; setAnim('walk'); dir=Math.random()<0.5?-1:1; vx=dir*walkSpeed; stateTimer=1800+Math.random()*3600; }
  }
  function tick(t){
    if(!last) last=t; const dt=Math.min(64,t-last); last=t; requestAnimationFrame(tick);
    if(!spec) return;
    const ground=floorY();
    if(anim){ frameTimer+=dt; if(frameTimer>=anim.frameMs){ frameTimer=0; frameIdx = anim.loop?(frameIdx+1):Math.min(frameIdx+1,anim.frames.length-1); } }
    if(held){ paint(); return; }                       // following the cursor
    if(state==='fall'){
      vy += 600*dt/1000; if(vy>280) vy=280;   // gentle fall with terminal velocity
      y += vy*dt/1000;
      if(y>=ground){ y=ground; vy=0; pick(); }
    } else {
      if(y < ground-1){ state='fall'; setAnim('fall'); vy=0; }
      else {
        y=ground; x += vx*dt/1000;
        if(x<=0){ x=0; dir=1; if(vx<0) vx=-vx; }
        else if(x>=window.innerWidth-pw()){ x=window.innerWidth-pw(); dir=-1; if(vx>0) vx=-vx; }
        stateTimer-=dt; if(stateTimer<=0) pick();
      }
    }
    paint();
  }

  // ---- Interaction: grab / drag / drop / tap ----
  el.addEventListener('pointerdown', e=>{
    e.preventDefault(); el.setPointerCapture(e.pointerId);
    held=true; moved=false; state='held'; setAnim('held'); vy=0;
    grabDX = e.clientX - x; grabDY = e.clientY - y;
    el.classList.add('grabbing');
  });
  el.addEventListener('pointermove', e=>{
    if(!held) return;
    const nx=e.clientX-grabDX, ny=e.clientY-grabDY;
    if(Math.abs(nx-x)>3 || Math.abs(ny-y)>3) moved=true;
    x=Math.max(0,Math.min(nx, window.innerWidth-pw()));
    y=Math.max(0,Math.min(ny, window.innerHeight-ph()));
    paint();
  });
  function release(e){
    if(!held) return; held=false; el.classList.remove('grabbing');
    try{ el.releasePointerCapture(e.pointerId); }catch(_){}
    if(moved){ state='fall'; setAnim('fall'); vy=0; }   // dropped → fall from here
    else { state='run'; setAnim('run'); dir=Math.random()<0.5?-1:1; vx=dir*walkSpeed*2.4; stateTimer=900; } // tap → scamper
  }
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('contextmenu', e=>{
    e.preventDefault();
    if(window.webkit&&webkit.messageHandlers&&webkit.messageHandlers.pet)
      webkit.messageHandlers.pet.postMessage({action:'menu'});
  });

  window.setGround = function(px){ groundOffsetPx = Math.max(0, px||0); };
  window.startPet = function(specJSON){
    try{ spec = (typeof specJSON==='string')?JSON.parse(specJSON):specJSON; }catch(e){ return; }
    sheetCols=spec.tilesx||spec.frames||1;
    fw=spec.frameWidth||0; fh=spec.frameHeight||0;
    walkSpeed=spec.speed||40; scale=spec.scale||1;
    const img=new Image();
    img.onload=function(){
      if(!fw) fw = img.width/sheetCols;
      if(!fh) fh = spec.tilesy ? img.height/spec.tilesy : img.height;
      el.style.width=pw()+'px'; el.style.height=ph()+'px';
      el.style.backgroundImage=`url('${spec.image}')`;
      el.style.backgroundSize=`${img.width*scale}px ${img.height*scale}px`;
      x=Math.random()*Math.max(1,window.innerWidth-pw()); y=-ph(); vy=0; state='fall'; setAnim('fall');
      last=0; requestAnimationFrame(tick);
    };
    img.src=spec.image;
  };
})();
</script>
</body>
</html>
