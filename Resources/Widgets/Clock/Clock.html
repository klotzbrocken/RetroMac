<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-user-select:none;}
  #win{position:relative;width:200px;}

  /* ---- BeOS yellow tab (default chrome) ---- */
  .tab{display:flex;align-items:center;gap:8px;height:22px;padding:0 8px;width:fit-content;
    position:relative;z-index:3;border:1.4px solid #2a2a2a;border-bottom:none;border-radius:5px 5px 0 0;
    background:linear-gradient(180deg,#fbd85c,#f2bd23);box-shadow:inset 1px 1px 0 rgba(255,255,255,.55);}
  .tab b{font-size:12px;font-weight:700;color:#2a2306;white-space:nowrap;}
  .closebox{width:13px;height:13px;border:1.4px solid #6f5a10;cursor:pointer;
    background:linear-gradient(135deg,#fbe27e,#eab92a);box-shadow:inset 1px 1px 0 rgba(255,255,255,.75);}
  .body{position:relative;z-index:2;margin-top:-1px;padding:10px;border:1px solid #000;
    background:#d8d3c0;box-shadow:inset 2px 2px 0 #efeada,inset -2px -2px 0 #b3ad98;}
  .face{display:block;margin:0 auto;background:transparent;}

  /* ===== Mac OS 9 (Platinum) ===== */
  .m9-title,.xp-title,.mf-title,.mx-title,.w98-title{display:none;}
  body.theme-macos9 .tab{display:none;}
  body.theme-macos9 #win{border:1px solid #000;background:#d8d8d8;box-shadow:2px 2px 8px rgba(0,0,0,.3);}
  body.theme-macos9 .body{border:none;background:#d8d8d8;box-shadow:none;margin:0;}
  body.theme-macos9 .m9-title{display:flex;align-items:center;position:relative;height:20px;
    border-bottom:1px solid #808080;background:repeating-linear-gradient(to bottom,#ededed 0 1px,#bdbdbd 1px 2px);}
  .m9-close{width:13px;height:13px;margin-left:7px;background:#d8d8d8;border:1px solid #555;
    border-top-color:#fff;border-left-color:#fff;box-shadow:inset -1px -1px 0 #808080,inset 1px 1px 0 #fff;cursor:pointer;z-index:2;}
  .m9-plaque{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#d8d8d8;
    padding:0 8px;font-size:12px;font-weight:700;color:#000;}

  /* ===== Windows XP (Luna) ===== */
  body.theme-winxp .tab{display:none;}

  /* ===== XP Luna scrollbars + controls (theme-winxp) ===== */
  body.theme-winxp ::-webkit-scrollbar,
  body.theme-winxp #pad::-webkit-scrollbar{width:17px;height:17px;}
  body.theme-winxp ::-webkit-scrollbar-track,
  body.theme-winxp #pad::-webkit-scrollbar-track{background:#d6e5f5;border-left:1px solid #aac3e0;}
  body.theme-winxp ::-webkit-scrollbar-thumb,
  body.theme-winxp #pad::-webkit-scrollbar-thumb{
    background:linear-gradient(90deg,#7fb1f5,#2f6fdd 50%,#4f8fe8);
    border:1px solid #1c4aa0;border-radius:3px;}
  body.theme-winxp ::-webkit-scrollbar-thumb:hover,
  body.theme-winxp #pad::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(90deg,#93c0fb,#4f8fe8 50%,#5f9ff2);}
  body.theme-winxp ::-webkit-scrollbar-button{
    height:17px;width:17px;background:linear-gradient(180deg,#eaf2fc,#bcd4ef);
    border:1px solid #6a93c8;border-radius:2px;}
  body.theme-winxp ::-webkit-scrollbar-corner{background:#d6e5f5;}
  body.theme-winxp button{
    font:12px Tahoma,"Segoe UI",sans-serif;padding:2px 12px;border-radius:3px;border:1px solid #003c74;
    background:linear-gradient(180deg,#fdfeff,#eaf0fb 45%,#d6e2f5);color:#000;}
  body.theme-winxp button:hover{border-color:#ff9a00;box-shadow:inset 0 0 5px rgba(255,154,0,.55);}
  body.theme-winxp button:active{background:linear-gradient(180deg,#cdd9ee,#e6eefc);}
  body.theme-winxp input,body.theme-winxp textarea,body.theme-winxp select{
    border:1px solid #7f9db9;background:#fff;border-radius:0;padding:2px 4px;font:12px Tahoma,"Segoe UI",sans-serif;}
  body.theme-winxp input:focus,body.theme-winxp textarea:focus,body.theme-winxp select:focus{
    outline:none;border-color:#2f6fdd;box-shadow:0 0 3px rgba(47,111,221,.7);}

  body.theme-winxp #win{border-radius:8px 8px 2px 2px;background:#0831D9;overflow:hidden;box-shadow:2px 5px 14px rgba(0,0,0,.45);}
  body.theme-winxp .body{border:none;background:#ECE9D8;margin:0 4px 4px;}
  body.theme-winxp .xp-title{display:flex;align-items:center;height:26px;gap:6px;padding:0 4px 0 8px;
    border-radius:8px 8px 0 0;background:linear-gradient(180deg,#0997FF,#0053EE 45%,#0066FF 52%,#003DD2);}
  .xp-cap{color:#fff;font:700 12px "Trebuchet MS",Tahoma,sans-serif;text-shadow:1px 1px 1px rgba(0,0,40,.5);}
  .xp-close{margin-left:auto;width:21px;height:19px;border-radius:3px;position:relative;cursor:pointer;
    border:1px solid rgba(255,255,255,.55);background:linear-gradient(180deg,#F7B39E,#E35F44 55%,#C4382A);}
  .xp-close::before,.xp-close::after{content:"";position:absolute;left:50%;top:50%;width:11px;height:2px;background:#fff;}
  .xp-close::before{transform:translate(-50%,-50%) rotate(45deg);} .xp-close::after{transform:translate(-50%,-50%) rotate(-45deg);}

  /* ===== Maiks Favourite (pixel macOS) ===== */
  body.theme-maiksfav .tab{display:none;}
  body.theme-maiksfav #win{background:#ECECEC;border:2px solid #262626;border-radius:10px;overflow:hidden;
    box-shadow:inset 2px 2px 0 #fff,inset -2px -2px 0 #c4c4c4,6px 6px 0 rgba(0,0,0,.35);}
  body.theme-maiksfav .body{border:none;background:#ECECEC;margin:0;}
  body.theme-maiksfav .mf-title{display:flex;align-items:center;position:relative;height:26px;gap:8px;padding:0 10px;
    background:#E3E3E3;border-bottom:2px solid #262626;font-family:"Pixelify Sans",monospace;}
  .mf-close{width:12px;height:12px;border-radius:50%;background:#FF5F57;border:1px solid rgba(0,0,0,.3);cursor:pointer;}
  .mf-cap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:700;color:#3a3a3a;}

  /* ===== Mac OS X (Aqua 10.0–10.4) ===== */
  body.theme-macosx .tab{display:none;}
  body.theme-macosx #win{border-radius:7px 7px 4px 4px;overflow:hidden;border:1px solid #5c5c5c;
    box-shadow:0 22px 50px rgba(0,0,0,.45),0 6px 14px rgba(0,0,0,.30);}
  body.theme-macosx .body{border:none;margin:0;padding:10px;background:#ededed;box-shadow:none;}
  body.theme-macosx .mx-title{display:flex;align-items:center;position:relative;height:22px;gap:6px;padding:0 8px;
    background:linear-gradient(to bottom,#fafafa,#ededed 26%,#dadada 60%,#c6c6c6 92%,#bcbcbc);
    border-bottom:1px solid #888;box-shadow:inset 0 1px 0 rgba(255,255,255,.7);}
  body.theme-macosx .mx-title::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.14) 0 1px,rgba(0,0,0,.028) 1px 2px);}
  .mx-lights{display:flex;gap:6px;align-items:center;position:relative;z-index:1;}
  .mx-gel{width:14px;height:14px;border-radius:50%;position:relative;flex:0 0 14px;
    box-shadow:inset 0 0 1px .5px rgba(0,0,0,.38),inset 0 -2.5px 3px rgba(0,0,0,.32),inset 0 2px 2px rgba(255,255,255,.30),0 1px 1.5px rgba(0,0,0,.42);}
  .mx-gel::before{content:"";position:absolute;left:2.5px;right:2.5px;top:1.5px;height:6px;border-radius:50%;z-index:1;
    background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.98),rgba(255,255,255,.55) 52%,rgba(255,255,255,0));}
  .mx-close{background:radial-gradient(circle at 50% 34%,#ffe6df,#ff8f7c 20%,#fb5038 46%,#e22a16 66%,#b51d0d 84%,#861309);cursor:pointer;}
  /* Clock has only a Close action → minimise/zoom are shown disabled (grey gel, no glyph). */
  .mx-min,.mx-zoom{background:radial-gradient(circle at 50% 34%,#ffffff,#f2f2f2 20%,#dedede 48%,#c2c2c2 70%,#a6a6a6 86%,#858585);}
  .mx-min .mx-glyph,.mx-zoom .mx-glyph{display:none;}
  .mx-cap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:1;
    font:700 13px "Lucida Grande","Helvetica Neue",Helvetica,Arial,sans-serif;color:#1a1a1a;text-shadow:0 1px 0 rgba(255,255,255,.6);}
  .mx-glyph{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;
    font:700 11px "Lucida Grande",Helvetica,Arial,sans-serif;color:rgba(0,0,0,.6);
    text-shadow:0 1px 0 rgba(255,255,255,.4);opacity:0;transition:opacity .08s linear;pointer-events:none;}
  body.hovering .mx-glyph{opacity:1;}

  /* ===== Windows 98 — SPEC-Farben/-Bevels, leicht skaliert für Lesbarkeit ===== */
  .w98-cap{color:#fff;font:700 12px Tahoma,"Microsoft Sans Serif",sans-serif;
    flex:1 1 auto;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .w98-btn{width:20px;height:18px;background:#c4c4c4;cursor:pointer;flex:0 0 auto;
    box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #dbdbdb,inset -2px -2px 0 #808080,inset 2px 2px 0 #fff;
    font:700 13px Tahoma,Verdana,sans-serif;color:#000;display:flex;align-items:center;justify-content:center;line-height:1;}
  .w98-btn:active{box-shadow:inset 1px 1px 0 #000,inset -1px -1px 0 #dbdbdb,inset 2px 2px 0 #808080,inset -2px -2px 0 #fff;}
  .w98-btn.w98-dis{color:#808080;text-shadow:1px 1px 0 #fff;cursor:default;}
  .w98-close{margin-left:3px;}
  /* Marlett-artige Glyphen (gezeichnet) — identisch zum nativen App-Fenster-Chrome */
  .w98-btn{font-size:0;position:relative;}
  #w98close::before,#w98close::after{content:"";position:absolute;left:50%;top:50%;width:11px;height:2px;background:#000;}
  #w98close::before{transform:translate(-50%,-50%) rotate(45deg);}
  #w98close::after{transform:translate(-50%,-50%) rotate(-45deg);}
  #w98min::before{content:"";position:absolute;left:4px;bottom:4px;width:8px;height:2px;background:#808080;box-shadow:1px 1px 0 #fff;}
  #w98max::before{content:"";position:absolute;left:4px;top:3px;width:10px;height:9px;border:1px solid #808080;border-top-width:2px;box-shadow:1px 1px 0 #fff;}
  body.theme-win98 .tab{display:none;}
  body.theme-win98 #win{background:#c4c4c4;
    box-shadow:inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 #808080,inset 2px 2px 0 #dbdbdb;}
  body.theme-win98 .body{border:none;background:#c4c4c4;box-shadow:none;margin:0;padding:8px;}
  body.theme-win98 .w98-title{display:flex;align-items:center;gap:2px;height:22px;margin:3px 3px 0;padding:0 2px 0 6px;
    background:linear-gradient(90deg,#00007b,#1085d2);}
</style>
</head>
<body>
  <div id="win">
    <!-- BeOS tab (default) -->
    <div class="tab" id="tab"><span class="closebox" id="bxclose" title="Close"></span><b>Clock</b></div>
    <!-- Mac OS 9 -->
    <div class="m9-title" id="m9title"><span class="m9-close" id="m9close"></span><div class="m9-plaque">Clock</div></div>
    <!-- Windows XP -->
    <div class="xp-title" id="xptitle"><span class="xp-cap">Clock</span><span class="xp-close" id="xpclose"></span></div>
    <!-- Maiks Favourite -->
    <div class="mf-title" id="mftitle"><span class="mf-close" id="mfclose"></span><span class="mf-cap">Clock</span></div>
    <!-- Mac OS X Aqua -->
    <div class="mx-title" id="mxtitle">
      <span class="mx-lights"><span class="mx-gel mx-close" id="mxclose" title="Close"><span class="mx-glyph">&times;</span></span><span class="mx-gel mx-min"><span class="mx-glyph">&minus;</span></span><span class="mx-gel mx-zoom"><span class="mx-glyph">+</span></span></span>
      <span class="mx-cap">Clock</span>
    </div>
    <!-- Windows 98 -->
    <div class="w98-title" id="w98title"><span class="w98-cap">Clock</span><span class="w98-btn" id="w98close">×</span></div>
    <div class="body">
      <canvas class="face" id="face" width="176" height="176"></canvas>
    </div>
  </div>
<script>
  const cv = document.getElementById('face'), ctx = cv.getContext('2d');
  let theme = 'beos';
  let use24 = false;   // set by the host (Settings → 24-hour clock)

  // Per-theme clock face styling (authentic-ish to each OS).
  function style(){
    switch(theme){
      case 'macos9': return {bg:'#ffffff', ring:'#000000', tick:'#000000', hand:'#000000', sec:'#cc2a17', num:false, face:'#ffffff'};
      case 'winxp':  return {bg:'#ffffff', ring:'#0831D9', tick:'#333333', hand:'#1a1a1a', sec:'#E35F44', num:true,  face:'#ffffff'};
      case 'maiksfav': return {bg:'#ffffff', ring:'#262626', tick:'#262626', hand:'#262626', sec:'#FF5F57', num:false, face:'#ffffff'};
      case 'macosx': return {bg:'#ffffff', ring:'#2a5db0', tick:'#333333', hand:'#1a1a1a', sec:'#e8483a', num:false, face:'#ffffff'};
      case 'win98': return {bg:'#ffffff', ring:'#000000', tick:'#000000', hand:'#000000', sec:'#ff0000', num:true, face:'#ffffff'};
      default:       return {bg:'#1d1d1d', ring:'#f2bd23', tick:'#f2bd23', hand:'#fbe27e', sec:'#ffffff', num:false, face:'#2b2b2b'}; // BeOS dark replicant
    }
  }
  function draw(){
    const s = style(), W = cv.width, R = W/2, cx = R, cy = R, rad = R-8;
    ctx.clearRect(0,0,W,W);
    // face
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,7); ctx.fillStyle=s.face; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle=s.ring; ctx.stroke();
    // ticks
    for(let i=0;i<60;i++){
      const a=i*Math.PI/30, major=(i%5===0);
      const r1=rad-(major?12:6), r2=rad-2;
      ctx.beginPath();
      ctx.moveTo(cx+Math.sin(a)*r1, cy-Math.cos(a)*r1);
      ctx.lineTo(cx+Math.sin(a)*r2, cy-Math.cos(a)*r2);
      ctx.lineWidth=major?2.5:1; ctx.strokeStyle=s.tick; ctx.stroke();
    }
    // numbers (XP)
    if(s.num){ ctx.fillStyle=s.tick; ctx.font='bold 14px Tahoma,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      for(let n=1;n<=12;n++){ const a=n*Math.PI/6, rr=rad-24; ctx.fillText(n, cx+Math.sin(a)*rr, cy-Math.cos(a)*rr); } }
    const now=new Date();
    const hh=now.getHours()%12, mm=now.getMinutes(), ss=now.getSeconds();
    const hand=(ang,len,w,col)=>{ ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.sin(ang)*len, cy-Math.cos(ang)*len); ctx.lineWidth=w; ctx.lineCap='round'; ctx.strokeStyle=col; ctx.stroke(); };
    hand((hh+mm/60)*Math.PI/6, rad*0.52, 4.5, s.hand);
    hand((mm+ss/60)*Math.PI/30, rad*0.74, 3, s.hand);
    hand(ss*Math.PI/30, rad*0.80, 1.5, s.sec);
    ctx.beginPath(); ctx.arc(cx,cy,3.5,0,7); ctx.fillStyle=s.hand; ctx.fill();
    // Digital readout (lower face) — reflects the 24-hour setting.
    const p2=n=>String(n).padStart(2,'0');
    let digital;
    if(use24){ digital = p2(now.getHours())+':'+p2(mm); }
    else { const h12=now.getHours()%12||12, ap=now.getHours()<12?'AM':'PM'; digital = h12+':'+p2(mm)+' '+ap; }
    ctx.font='bold 13px Tahoma,"Segoe UI",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=s.tick; ctx.fillText(digital, cx, cy+rad*0.52);
  }
  setInterval(draw, 1000); draw();

  window.setTheme=function(k){ theme=k||'beos'; document.body.className='theme-'+theme; draw(); };
  window.set24=function(v){ use24=!!v; draw(); };
  window.setHover=function(h){ document.body.classList.toggle('hovering', !!h); };

  function postClose(){ if(window.webkit&&webkit.messageHandlers&&webkit.messageHandlers.clock) webkit.messageHandlers.clock.postMessage('close'); }
  ['bxclose','m9close','xpclose','mfclose','mxclose','w98close'].forEach(id=>{ const e=document.getElementById(id); if(e) e.addEventListener('click',ev=>{ev.stopPropagation();postClose();}); });

  // Title + close rects for the native drag/close overlay.
  window.regions=function(){
    const cl=document.body.classList;
    const R=id=>{const e=document.getElementById(id);if(!e)return[0,0,0,0];const b=e.getBoundingClientRect();return[b.x,b.y,b.width,b.height];};
    if(cl.contains('theme-win98'))    return [...R('w98title'),...R('w98close')];
    if(cl.contains('theme-macosx'))   return [...R('mxtitle'),...R('mxclose')];
    if(cl.contains('theme-maiksfav')) return [...R('mftitle'),...R('mfclose')];
    if(cl.contains('theme-winxp'))    return [...R('xptitle'),...R('xpclose')];
    if(cl.contains('theme-macos9'))   return [...R('m9title'),...R('m9close')];
    return [...R('tab'),...R('bxclose')];
  };
  window.widgetSize=function(){ const w=document.getElementById('win'); return [w.offsetWidth, w.offsetHeight]; };
</script>
</body>
</html>
